version: '3.8'

services:
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    ports:
      - "8000:80"  # Map host port 8000 to container port 80
    depends_on:
      - orchestrator
      - auth
      - provider-management
      - provider-communication
      - provider-health
      - general-api
    networks:
      - inferoute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    expose:
      - "8080"
    networks:
      - inferoute-network
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
    expose:
      - "8081"
    networks:
      - inferoute-network
    restart: unless-stopped

  provider-management:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-management
    expose:
      - "8082"
    networks:
      - inferoute-network
    restart: unless-stopped

  provider-communication:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-communication
    expose:
      - "8083"
    networks:
      - inferoute-network
    restart: unless-stopped

  provider-health:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-health
    expose:
      - "8084"
    networks:
      - inferoute-network
    restart: unless-stopped

  general-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.general-api
    expose:
      - "8085"
    networks:
      - inferoute-network
    restart: unless-stopped

  model-pricing:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE_NAME: model-pricing
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=8085
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    ports:
      - "8085:8085"
    depends_on:
      - cockroachdb
    networks:
      - inferoute-network

networks:
  inferoute-network:
    driver: bridge 
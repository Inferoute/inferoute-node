# Common environment variables for all services
x-common-variables: &common-variables
  ENVIRONMENT: ${ENVIRONMENT:-development}
  SERVER_HOST: 0.0.0.0
  DATABASE_HOST: cockroachdb
  DATABASE_PORT: ${DATABASE_PORT:-26257}
  DATABASE_USER: ${DATABASE_USER:-root}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:-}
  DATABASE_DBNAME: ${DATABASE_DBNAME:-inferoute}
  DATABASE_SSLMODE: ${DATABASE_SSLMODE:-disable}
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
  RABBITMQ_USER: ${RABBITMQ_USER:-inferoute}
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-Nightshade900!}
  RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
  INTERNAL_API_KEY: ${INTERNAL_API_KEY:-klondikee}
  INTERNAL_NETWORK_CIDR: ${INTERNAL_NETWORK_CIDR:-172.16.0.0/12}
  VIRTUAL_HOST: ${VIRTUAL_HOST:-core.inferoute.com}
  LETSENCRYPT_HOST: ${VIRTUAL_HOST:-core.inferoute.com}
  LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-your-email@example.com}
  VIRTUAL_PATH: ${VIRTUAL_PATH:-/}


services:
  # Nginx Proxy for SSL termination
  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.7
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - conf:/etc/nginx/conf.d
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    environment:
      - DEFAULT_HOST=core.inferoute.com
    networks:
      - inferoute-net
    restart: unless-stopped

  # Let's Encrypt companion
  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    volumes_from:
      - nginx-proxy
    volumes:
      - certs:/etc/nginx/certs:rw
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DEFAULT_EMAIL=${LETSENCRYPT_EMAIL:-your-email@example.com}
    networks:
      - inferoute-net
    depends_on:
      - nginx-proxy
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    environment:
      <<: *common-variables
      VIRTUAL_HOST: core.inferoute.com
      VIRTUAL_PATH: /
    expose:
      - "80"
    depends_on:
      - nginx-proxy
      - orchestrator
      - auth
      - provider-management
      - provider-communication
      - provider-health
      - model-pricing
    networks:
      - inferoute-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    env_file: .env
    expose:
      - "8080"
    environment:
      <<: *common-variables
      SERVER_PORT: 8080
      VIRTUAL_HOST: core.inferoute.com
      VIRTUAL_PATH: /api/orchestrator/
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
    env_file: .env
    expose:
      - "8081"
    environment:
      <<: *common-variables
      SERVER_PORT: 8081
      AUTH_HMACSECRET: ${AUTH_HMACSECRET:-your-hmac-secret-key}
      AUTH_TOKENDURATION: ${AUTH_TOKENDURATION:-60}
      VIRTUAL_HOST: core.inferoute.com
      VIRTUAL_PATH: /api/auth/
    depends_on:
      - cockroachdb
    networks:
      - inferoute-net
    restart: unless-stopped

  provider-management:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-management
    env_file: .env
    expose:
      - "8082"
    environment:
      <<: *common-variables
      SERVER_PORT: 8082
      VIRTUAL_HOST: core.inferoute.com
      VIRTUAL_PATH: /api/provider/
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  provider-communication:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-communication
    env_file: .env
    expose:
      - "8083"
    environment:
      <<: *common-variables
      SERVER_PORT: 8083
      VIRTUAL_HOST: core.inferoute.com
      VIRTUAL_PATH: /api/provider/health/
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  provider-health:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-health
    env_file: .env
    expose:
      - "8084"
    environment:
      <<: *common-variables
      SERVER_PORT: 8084
      VIRTUAL_HOST: core.inferoute.com
      VIRTUAL_PATH: /api/provider-health/
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  model-pricing:
    build:
      context: .
      dockerfile: docker/Dockerfile.model-pricing
    env_file: .env
    expose:
      - "8085"
    environment:
      <<: *common-variables
      SERVER_PORT: 8085
      VIRTUAL_HOST: core.inferoute.com
      VIRTUAL_PATH: /api/pricing/
    depends_on:
      - cockroachdb
    networks:
      - inferoute-net
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.scheduler
    env_file: .env
    environment:
      <<: *common-variables
    depends_on:
      - model-pricing
      - provider-health
    networks:
      - inferoute-net
    restart: unless-stopped

  # CockroachDB container
  cockroachdb:
    image: cockroachdb/cockroach:v23.1.11
    command: start --insecure --advertise-addr=${WIREGUARD_IP}:26257 --join=${WIREGUARD_IP}:26257 --cache=.25 --max-sql-memory=.25
    environment:
      WIREGUARD_IP: ${WIREGUARD_IP}
      COCKROACH_JOIN_IPS: ${WIREGUARD_IP}:26257
    ports:
      - "${WIREGUARD_IP}:26257:26257"  # SQL port, bind to WireGuard IP
    expose:
      - "8080"    # UI port, only needed internally
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    networks:
      - inferoute-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ container
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    expose:
      - "5672"    # AMQP port
      - "15672"   # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-inferoute}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-Nightshade900!}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  # API Testing container
  api-testing:
    image: alpine:3.19
    command: tail -f /dev/null  # Keep container running
    networks:
      - inferoute-net
    environment:
      <<: *common-variables
    restart: unless-stopped

volumes:
  cockroach-data:
  rabbitmq-data:
  conf:
  vhost:
  html:
  certs:
  acme:

networks:
  inferoute-net:
    name: inferoute-net
    external: true 
version: '3.8'

# Common environment variables for all services
x-common-variables: &common-variables
  ENVIRONMENT: ${ENVIRONMENT:-development}
  SERVER_HOST: 0.0.0.0
  DATABASE_HOST: cockroachdb
  DATABASE_PORT: ${DATABASE_PORT:-26257}
  DATABASE_USER: ${DATABASE_USER:-root}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:-}
  DATABASE_DBNAME: ${DATABASE_DBNAME:-inferoute}
  DATABASE_SSLMODE: ${DATABASE_SSLMODE:-disable}
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
  RABBITMQ_USER: ${RABBITMQ_USER:-inferoute}
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-Nightshade900!}
  RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
  INTERNAL_API_KEY: ${INTERNAL_API_KEY:-klondikee}
  INTERNAL_NETWORK_CIDR: ${INTERNAL_NETWORK_CIDR:-172.16.0.0/12}
  VIRTUAL_HOST: core.infereoute.com
  LETSENCRYPT_HOST: core.infereoute.com
  LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-your-email@example.com}

services:
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    environment:
      <<: *common-variables
    expose:
      - "80"
    depends_on:
      - orchestrator
      - auth
      - provider-management
      - provider-communication
      - provider-health
      - model-pricing
    networks:
      - sentnl-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    env_file: .env
    expose:
      - "8080"
    environment:
      <<: *common-variables
      SERVER_PORT: 8080
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - sentnl-net
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
    env_file: .env
    expose:
      - "8081"
    environment:
      <<: *common-variables
      SERVER_PORT: 8081
      AUTH_HMACSECRET: ${AUTH_HMACSECRET:-your-hmac-secret-key}
      AUTH_TOKENDURATION: ${AUTH_TOKENDURATION:-60}
    depends_on:
      - cockroachdb
    networks:
      - sentnl-net
    restart: unless-stopped

  provider-management:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-management
    env_file: .env
    expose:
      - "8082"
    environment:
      <<: *common-variables
      SERVER_PORT: 8082
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - sentnl-net
    restart: unless-stopped

  provider-communication:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-communication
    env_file: .env
    expose:
      - "8083"
    environment:
      <<: *common-variables
      SERVER_PORT: 8083
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - sentnl-net
    restart: unless-stopped

  provider-health:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-health
    env_file: .env
    expose:
      - "8084"
    environment:
      <<: *common-variables
      SERVER_PORT: 8084
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - sentnl-net
    restart: unless-stopped

  model-pricing:
    build:
      context: .
      dockerfile: docker/Dockerfile.model-pricing
    env_file: .env
    expose:
      - "8085"
    environment:
      <<: *common-variables
      SERVER_PORT: 8085
    depends_on:
      - cockroachdb
    networks:
      - sentnl-net
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.scheduler
    env_file: .env
    environment:
      <<: *common-variables
    depends_on:
      - model-pricing
      - provider-health
    networks:
      - sentnl-net
    restart: unless-stopped

  # CockroachDB container
  cockroachdb:
    image: cockroachdb/cockroach:v23.1.11
    command: >
      start --insecure 
      --advertise-addr=$${WIREGUARD_IP}:26257 
      --join=$${COCKROACH_JOIN_IPS:-$${WIREGUARD_IP}:26257} 
      --cache=.25 
      --max-sql-memory=.25
    ports:
      - "${WIREGUARD_IP}:26257:26257"  # SQL port, bind to WireGuard IP
    expose:
      - "8080"    # UI port, only needed internally
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    networks:
      - sentnl-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ container
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    expose:
      - "5672"    # AMQP port
      - "15672"   # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-inferoute}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-Nightshade900!}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./docker/files/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/files/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - sentnl-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cockroach-data:
  rabbitmq-data:

networks:
  sentnl-net:
    driver: bridge 
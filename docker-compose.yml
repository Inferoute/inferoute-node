# Common environment variables for all services
x-common-variables: &common-variables
  ENVIRONMENT: ${ENVIRONMENT:-development}
  SERVER_HOST: ${SERVER_HOST}
  DATABASE_HOST: ${DATABASE_HOST}
  DATABASE_PORT: ${DATABASE_PORT}
  DATABASE_USER: ${DATABASE_USER}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD}
  DATABASE_DBNAME: ${DATABASE_DBNAME}
  DATABASE_SSLMODE: ${DATABASE_SSLMODE}
  RABBITMQ_HOST: ${RABBITMQ_HOST}
  RABBITMQ_PORT: ${RABBITMQ_PORT}
  RABBITMQ_USER: ${RABBITMQ_USER}
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
  RABBITMQ_VHOST: ${RABBITMQ_VHOST}
  INTERNAL_API_KEY: ${INTERNAL_API_KEY}
  INTERNAL_NETWORK_CIDR: ${INTERNAL_NETWORK_CIDR}
  DOMAIN: ${DOMAIN}
  VIRTUAL_HOST: ${VIRTUAL_HOST:-core.inferoute.com}
  LETSENCRYPT_HOST: ${VIRTUAL_HOST:-core.inferoute.com}
  LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-charles@inferoute.com}


services:
  # Traefik for development (HTTP only)
  traefik-dev:
    image: traefik:v2.10
    container_name: traefik
    profiles: ["development"]
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=inferoute-net"
      - "--entrypoints.web.address=:80"
      - "--log.level=DEBUG"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=HostRegexp(`{host:.+}`)"
      - "traefik.http.routers.api.entrypoints=web"
    networks:
      - inferoute-net
    restart: unless-stopped

  # Traefik for production (with HTTPS)
  traefik-prod:
    image: traefik:v2.10
    container_name: traefik
    profiles: ["production"]
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=inferoute-net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=DEBUG"
      - "--certificatesresolvers.letsencrypt.acme.email=charles@inferoute.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certificates/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/certificates
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.http-catchall.rule=Host(`core.inferoute.com`)"
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      - "traefik.http.routers.https-catchall.rule=Host(`core.inferoute.com`)"
      - "traefik.http.routers.https-catchall.entrypoints=websecure"
      - "traefik.http.routers.https-catchall.tls=true"
      - "traefik.http.routers.https-catchall.tls.certresolver=letsencrypt"
    networks:
      - inferoute-net
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
      args:
        ENVIRONMENT: ${ENVIRONMENT:-development}
    container_name: orchestrator
    env_file: docker/env/${ENVIRONMENT:-development}.env
    expose:
      - "8080"
    environment:
      <<: *common-variables
      SERVER_PORT: 8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator.rule=${TRAEFIK_ROUTER_RULE_HOST}PathPrefix(`/v1`)"
      - "traefik.http.routers.orchestrator.entrypoints=${TRAEFIK_ROUTER_ENTRYPOINTS}"
      - "traefik.http.services.orchestrator.loadbalancer.server.port=8080"
      - "traefik.http.routers.orchestrator.tls.certresolver=letsencrypt"
    depends_on:
      - cockroachdb
      - rabbitmq
      - provider-communication
      - provider-health
      - model-pricing
    networks:
      - inferoute-net
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
      args:
        ENVIRONMENT: ${ENVIRONMENT:-development}
    container_name: auth
    env_file: docker/env/${ENVIRONMENT:-development}.env
    expose:
      - "8081"
    environment:
      <<: *common-variables
      SERVER_PORT: 8081
      AUTH_HMACSECRET: ${AUTH_HMACSECRET}
      AUTH_TOKENDURATION: ${AUTH_TOKENDURATION}
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  provider-management:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-management
      args:
        ENVIRONMENT: ${ENVIRONMENT:-development}
    container_name: provider-management
    env_file: docker/env/${ENVIRONMENT:-development}.env
    expose:
      - "8082"
    environment:
      <<: *common-variables
      SERVER_PORT: 8082
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.provider-management.rule=${TRAEFIK_ROUTER_RULE_HOST}PathPrefix(`/api/provider`)"
      - "traefik.http.routers.provider-management.entrypoints=${TRAEFIK_ROUTER_ENTRYPOINTS}"
      - "traefik.http.services.provider-management.loadbalancer.server.port=8082"
      - "traefik.http.routers.provider-management.tls.certresolver=letsencrypt"
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  provider-communication:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-communication
      args:
        ENVIRONMENT: ${ENVIRONMENT:-development}
    container_name: provider-communication
    env_file: docker/env/${ENVIRONMENT:-development}.env
    expose:
      - "8083"
    environment:
      <<: *common-variables
      SERVER_PORT: 8083
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  provider-health:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-health
      args:
        ENVIRONMENT: ${ENVIRONMENT:-development}
    container_name: provider-health
    env_file: docker/env/${ENVIRONMENT:-development}.env
    expose:
      - "8084"
    environment:
      <<: *common-variables
      SERVER_PORT: 8084
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.provider-health.rule=${TRAEFIK_ROUTER_RULE_HOST}PathPrefix(`/api/health/providers`)"
      - "traefik.http.routers.provider-health.entrypoints=${TRAEFIK_ROUTER_ENTRYPOINTS}"
      - "traefik.http.services.provider-health.loadbalancer.server.port=8084"
      - "traefik.http.routers.provider-health.tls.certresolver=letsencrypt"
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  model-pricing:
    build:
      context: .
      dockerfile: docker/Dockerfile.model-pricing
      args:
        ENVIRONMENT: ${ENVIRONMENT:-development}
    container_name: model-pricing
    env_file: docker/env/${ENVIRONMENT:-development}.env
    expose:
      - "8085"
    environment:
      <<: *common-variables
      SERVER_PORT: 8085
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.model-pricing.rule=${TRAEFIK_ROUTER_RULE_HOST}PathPrefix(`/api/model-pricing`)"
      - "traefik.http.routers.model-pricing.entrypoints=${TRAEFIK_ROUTER_ENTRYPOINTS}"
      - "traefik.http.services.model-pricing.loadbalancer.server.port=8085"
      - "traefik.http.routers.model-pricing.tls.certresolver=letsencrypt"
    depends_on:
      - cockroachdb
    networks:
      - inferoute-net
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.scheduler
      args:
        ENVIRONMENT: ${ENVIRONMENT:-development}
    container_name: scheduler
    env_file: docker/env/${ENVIRONMENT:-development}.env
    environment:
      <<: *common-variables
    depends_on:
      - model-pricing
      - provider-health
    networks:
      - inferoute-net
    restart: unless-stopped

  payment-processing:
    build:
      context: .
      dockerfile: docker/Dockerfile.payment-processing
      args:
        ENVIRONMENT: ${ENVIRONMENT:-development}
    container_name: payment-processing
    env_file: docker/env/${ENVIRONMENT:-development}.env
    environment:
      <<: *common-variables
      SERVER_PORT: 8086
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  # CockroachDB container
  cockroachdb:
    container_name: cockroachdb
    image: cockroachdb/cockroach:v23.1.11
    command: 
      - start
      - --insecure
      - --advertise-addr
      - ${WIREGUARD_IP}
      - --join
      - ${WIREGUARD_IP}
      - --cache=.25
      - --max-sql-memory=.25
    environment:
      WIREGUARD_IP: ${WIREGUARD_IP}
      COCKROACH_JOIN_IPS: ${WIREGUARD_IP}
    ports:
      - "${WIREGUARD_IP}:26257:26257"  # Bind to WireGuard IP
    expose:
      - "8080"    # UI port, only needed internally
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    networks:
      - inferoute-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ container
  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3.12-management-alpine
    expose:
      - "5672"    # AMQP port
      - "15672"   # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  # API Testing container
  api-testing:
    container_name: api-testing
    image: alpine:3.19
    command: tail -f /dev/null  # Keep container running
    networks:
      - inferoute-net
    environment:
      <<: *common-variables
    volumes:
      - ./docker/files/api-testing/create_test_users.sh:/create_test_users.sh
    restart: unless-stopped
    entrypoint: |
      /bin/sh -c "
      apk add --no-cache curl nano jq
      chmod +x /create_test_users.sh
      tail -f /dev/null
      "

volumes:
  cockroach-data:
  rabbitmq-data:
  traefik-certificates:

networks:
  inferoute-net:
    name: inferoute-net
    external: true 
version: '3.8'

# Common environment variables for all services
x-common-variables: &common-variables
  ENVIRONMENT: ${ENVIRONMENT:-development}
  SERVER_HOST: 0.0.0.0
  DATABASE_HOST: cockroachdb
  DATABASE_PORT: ${DATABASE_PORT:-26257}
  DATABASE_USER: ${DATABASE_USER:-root}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:-}
  DATABASE_DBNAME: ${DATABASE_DBNAME:-inferoute}
  DATABASE_SSLMODE: ${DATABASE_SSLMODE:-disable}
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
  RABBITMQ_USER: ${RABBITMQ_USER:-inferoute}
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-Nightshade900!}
  RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
  INTERNAL_API_KEY: ${INTERNAL_API_KEY:-klondikee}
  INTERNAL_NETWORK_CIDR: ${INTERNAL_NETWORK_CIDR:-172.16.0.0/12}

services:
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    ports:
      - "8000:80"  # Map host port 8000 to container port 80
    depends_on:
      - orchestrator
      - auth
      - provider-management
      - provider-communication
      - provider-health
      - model-pricing
    networks:
      - inferoute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    expose:
      - "8080"
    environment:
      <<: *common-variables
      SERVER_PORT: 8080
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-network
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
    expose:
      - "8081"
    environment:
      <<: *common-variables
      SERVER_PORT: 8081
      AUTH_HMACSECRET: ${AUTH_HMACSECRET:-your-hmac-secret-key}
      AUTH_TOKENDURATION: ${AUTH_TOKENDURATION:-60}
    depends_on:
      - cockroachdb
    networks:
      - inferoute-network
    restart: unless-stopped

  provider-management:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-management
    expose:
      - "8082"
    environment:
      <<: *common-variables
      SERVER_PORT: 8082
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-network
    restart: unless-stopped

  provider-communication:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-communication
    expose:
      - "8083"
    environment:
      <<: *common-variables
      SERVER_PORT: 8083
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-network
    restart: unless-stopped

  provider-health:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-health
    expose:
      - "8084"
    environment:
      <<: *common-variables
      SERVER_PORT: 8084
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-network
    restart: unless-stopped

  model-pricing:
    build:
      context: .
      dockerfile: docker/Dockerfile.model-pricing
    expose:
      - "8085"
    environment:
      <<: *common-variables
      SERVER_PORT: 8085
    depends_on:
      - cockroachdb
    networks:
      - inferoute-network
    restart: unless-stopped

  # CockroachDB container
  cockroachdb:
    image: cockroachdb/cockroach:v23.1.11
    command: start-single-node --insecure
    ports:
      - "26257:26257"  # SQL port
      - "8080:8080"    # UI port
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    networks:
      - inferoute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ container
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-inferoute}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-Nightshade900!}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./docker/files/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/files/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - inferoute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cockroach-data:
  rabbitmq-data:

networks:
  inferoute-network:
    driver: bridge 
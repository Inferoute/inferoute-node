# Common environment variables for all services
x-common-variables: &common-variables
  ENVIRONMENT: ${ENVIRONMENT:-development}
  SERVER_HOST: 0.0.0.0
  DATABASE_HOST: cockroachdb
  DATABASE_PORT: ${DATABASE_PORT:-26257}
  DATABASE_USER: ${DATABASE_USER:-root}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:-}
  DATABASE_DBNAME: ${DATABASE_DBNAME:-inferoute}
  DATABASE_SSLMODE: ${DATABASE_SSLMODE:-disable}
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
  RABBITMQ_USER: ${RABBITMQ_USER:-inferoute}
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-Nightshade900!}
  RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
  INTERNAL_API_KEY: ${INTERNAL_API_KEY:-klondikee}
  INTERNAL_NETWORK_CIDR: ${INTERNAL_NETWORK_CIDR:-172.18.0.0/12}
  VIRTUAL_HOST: ${VIRTUAL_HOST:-core.inferoute.com}
  LETSENCRYPT_HOST: ${VIRTUAL_HOST:-core.inferoute.com}
  LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-your-email@example.com}


services:
  # Traefik reverse proxy
  traefik:
    image: traefik:v2.10
    container_name: traefik
    command:
      - "--api.insecure=true"  # Enable dashboard
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-your-email@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/letsencrypt
    networks:
      - inferoute-net
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    container_name: nginx
    environment:
      <<: *common-variables
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nginx.rule=Host(`core.inferoute.com`)"
      - "traefik.http.routers.nginx.entrypoints=websecure"
      - "traefik.http.routers.nginx.tls.certresolver=letsencrypt"
      - "traefik.http.services.nginx.loadbalancer.server.port=80"
    networks:
      - inferoute-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    container_name: orchestrator
    env_file: .env
    expose:
      - "8080"
    environment:
      <<: *common-variables
      SERVER_PORT: 8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator.rule=Host(`core.inferoute.com`) && PathPrefix(`/api/orchestrator`)"
      - "traefik.http.routers.orchestrator.entrypoints=websecure"
      - "traefik.http.routers.orchestrator.tls.certresolver=letsencrypt"
      - "traefik.http.services.orchestrator.loadbalancer.server.port=8080"
    depends_on:
      - cockroachdb
      - rabbitmq
      - provider-communication
      - provider-health
      - model-pricing
    networks:
      - inferoute-net
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
    container_name: auth
    env_file: .env
    expose:
      - "8081"
    environment:
      <<: *common-variables
      SERVER_PORT: 8081
      AUTH_HMACSECRET: ${AUTH_HMACSECRET:-your-hmac-secret-key}
      AUTH_TOKENDURATION: ${AUTH_TOKENDURATION:-60}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`core.inferoute.com`) && PathPrefix(`/api/auth`)"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.routers.auth.tls.certresolver=letsencrypt"
      - "traefik.http.services.auth.loadbalancer.server.port=8081"
    depends_on:
      - cockroachdb
    networks:
      - inferoute-net
    restart: unless-stopped

  provider-management:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-management
    container_name: provider-management
    env_file: .env
    expose:
      - "8082"
    environment:
      <<: *common-variables
      SERVER_PORT: 8082
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.provider-mgmt.rule=Host(`core.inferoute.com`) && PathPrefix(`/api/provider`)"
      - "traefik.http.routers.provider-mgmt.entrypoints=websecure"
      - "traefik.http.routers.provider-mgmt.tls.certresolver=letsencrypt"
      - "traefik.http.services.provider-mgmt.loadbalancer.server.port=8082"
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  provider-communication:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-communication
    container_name: provider-communication
    env_file: .env
    expose:
      - "8083"
    environment:
      <<: *common-variables
      SERVER_PORT: 8083
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  provider-health:
    build:
      context: .
      dockerfile: docker/Dockerfile.provider-health
    container_name: provider-health
    env_file: .env
    expose:
      - "8084"
    environment:
      <<: *common-variables
      SERVER_PORT: 8084
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.provider-health.rule=Host(`core.inferoute.com`) && PathPrefix(`/api/health/providers`)"
      - "traefik.http.routers.provider-health.entrypoints=websecure"
      - "traefik.http.routers.provider-health.tls.certresolver=letsencrypt"
      - "traefik.http.services.provider-health.loadbalancer.server.port=8084"
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  model-pricing:
    build:
      context: .
      dockerfile: docker/Dockerfile.model-pricing
    container_name: model-pricing
    env_file: .env
    expose:
      - "8085"
    environment:
      <<: *common-variables
      SERVER_PORT: 8085
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.model-pricing.rule=Host(`core.inferoute.com`) && PathPrefix(`/api/model-pricing`)"
      - "traefik.http.routers.model-pricing.entrypoints=websecure"
      - "traefik.http.routers.model-pricing.tls.certresolver=letsencrypt"
      - "traefik.http.services.model-pricing.loadbalancer.server.port=8085"
    depends_on:
      - cockroachdb
    networks:
      - inferoute-net
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.scheduler
    container_name: scheduler
    env_file: .env
    environment:
      <<: *common-variables
    depends_on:
      - model-pricing
      - provider-health
    networks:
      - inferoute-net
    restart: unless-stopped

  payment-processing:
    build:
      context: .
      dockerfile: docker/Dockerfile.payment-processing
    container_name: payment-processing
    env_file: .env
    environment:
      <<: *common-variables
      SERVER_PORT: 8086
    depends_on:
      - cockroachdb
      - rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  # CockroachDB container
  cockroachdb:
    container_name: cockroachdb
    image: cockroachdb/cockroach:v23.1.11
    command: start --insecure --advertise-addr=${WIREGUARD_IP}:26257 --join=${WIREGUARD_IP}:26257 --cache=.25 --max-sql-memory=.25
    environment:
      WIREGUARD_IP: ${WIREGUARD_IP}
      COCKROACH_JOIN_IPS: ${WIREGUARD_IP}:26257
    ports:
      - "${WIREGUARD_IP}:26257:26257"  # SQL port, bind to WireGuard IP
    expose:
      - "8080"    # UI port, only needed internally
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    networks:
      - inferoute-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ container
  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3.12-management-alpine
    expose:
      - "5672"    # AMQP port
      - "15672"   # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-inferoute}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-Nightshade900!}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  # API Testing container
  api-testing:
    container_name: api-testing
    image: alpine:3.19
    command: tail -f /dev/null  # Keep container running
    networks:
      - inferoute-net
    environment:
      <<: *common-variables
    restart: unless-stopped

volumes:
  cockroach-data:
  rabbitmq-data:
  traefik-certificates:

networks:
  inferoute-net:
    name: inferoute-net
    external: true 
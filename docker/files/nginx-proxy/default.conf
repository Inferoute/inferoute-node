# Standard nginx configuration maps and settings
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    '' $scheme;
}

map $http_upgrade $proxy_connection {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen 443 ssl http2;
    server_name core.inferoute.com;

    # SSL configuration (reuse your existing SSL settings)
    ssl_certificate /etc/nginx/certs/core.inferoute.com.crt;
    ssl_certificate_key /etc/nginx/certs/core.inferoute.com.key;
    ssl_dhparam /etc/nginx/certs/core.inferoute.com.dhparam.pem;
    ssl_trusted_certificate /etc/nginx/certs/core.inferoute.com.chain.pem;

    # Common proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

    # Provider Communication Service
    location /api/provider/health {
        proxy_pass http://172.18.0.10:8083;
    }

    # Provider Health Service
    location /api/provider-health/ {
        proxy_pass http://172.18.0.13:8084;
    }

    # Provider Management Service
    location /api/provider/ {
        proxy_pass http://172.18.0.11:8082;
    }

    # Auth Service
    location /api/auth/ {
        proxy_pass http://172.18.0.7:8081;
    }

    # Model Pricing Service
    location /api/pricing/ {
        proxy_pass http://172.18.0.8:8085;
    }

    # Orchestrator Service
    location /api/orchestrator/ {
        proxy_pass http://172.18.0.12:8080;
    }

    # Default to nginx service for static content
    location / {
        proxy_pass http://172.18.0.9:80;
    }
} 
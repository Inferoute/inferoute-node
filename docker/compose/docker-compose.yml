# Common environment variables for all services
x-common-variables: &common-variables
  RABBITMQ_USER: ${RABBITMQ_USER}
  RABBITMQ_PASS: ${RABBITMQ_PASS}
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_VHOST: /
  COCKROACH_HOST: cockroachdb
  COCKROACH_PORT: 26257
  COCKROACH_USER: ${COCKROACH_USER}
  COCKROACH_PASS: ${COCKROACH_PASS}
  COCKROACH_DB: ${COCKROACH_DB}

services:
  # Traefik for development (HTTP only)
  traefik-dev:
    image: traefik:v2.10
    container_name: traefik
    profiles: ["development"]
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=inferoute-net"
      - "--entrypoints.web.address=:80"
      - "--log.level=DEBUG"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=HostRegexp(`{host:.+}`)"
      - "traefik.http.routers.api.entrypoints=web"
    networks:
      - inferoute-net
    restart: unless-stopped

  # Traefik for production (with HTTPS)
  traefik-prod:
    image: traefik:v2.10
    container_name: traefik
    profiles: ["production"]
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=inferoute-net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=DEBUG"
      - "--accesslog=true"
      - "--accesslog.fields.headers.names.User-Agent=keep"
      - "--accesslog.fields.headers.names.Authorization=keep"
      - "--accesslog.fields.headers.names.Content-Type=keep"
      - "--certificatesresolvers.letsencrypt.acme.email=charles@inferoute.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certificates/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/certificates
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.http-catchall.rule=Host(`core.inferoute.com`)"
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      - "traefik.http.routers.https-catchall.rule=Host(`core.inferoute.com`)"
      - "traefik.http.routers.https-catchall.entrypoints=websecure"
      - "traefik.http.routers.https-catchall.tls=true"
      - "traefik.http.routers.https-catchall.tls.certresolver=letsencrypt"
    networks:
      - inferoute-net
    restart: unless-stopped

  orchestrator:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.orchestrator
    container_name: orchestrator
    environment:
      <<: *common-variables
    expose:
      - "8080"
    depends_on:
      - rabbitmq
      - cockroachdb
    networks:
      - inferoute-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator.rule=PathPrefix(`/api/orchestrator`)"
      - "traefik.http.services.orchestrator.loadbalancer.server.port=8080"
    restart: unless-stopped

  auth:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.auth
    container_name: auth
    environment:
      <<: *common-variables
    expose:
      - "8081"
    depends_on:
      - rabbitmq
      - cockroachdb
    networks:
      - inferoute-net
    restart: unless-stopped

  provider-management:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.provider-management
    container_name: provider-management
    environment:
      <<: *common-variables
    expose:
      - "8082"
    depends_on:
      - rabbitmq
      - cockroachdb
    networks:
      - inferoute-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.provider-management.rule=PathPrefix(`/api/provider`)"
      - "traefik.http.services.provider-management.loadbalancer.server.port=8082"
    restart: unless-stopped

  provider-communication:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.provider-communication
    container_name: provider-communication
    environment:
      <<: *common-variables
    expose:
      - "8083"
    depends_on:
      - rabbitmq
      - cockroachdb
    networks:
      - inferoute-net
    restart: unless-stopped

  provider-health:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.provider-health
    container_name: provider-health
    environment:
      <<: *common-variables
    expose:
      - "8084"
    depends_on:
      - rabbitmq
      - cockroachdb
    networks:
      - inferoute-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.provider-health.rule=PathPrefix(`/api/health`)"
      - "traefik.http.services.provider-health.loadbalancer.server.port=8084"
    restart: unless-stopped

  model-pricing:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.model-pricing
    container_name: model-pricing
    environment:
      <<: *common-variables
    expose:
      - "8085"
    depends_on:
      - rabbitmq
      - cockroachdb
    networks:
      - inferoute-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.model-pricing.rule=PathPrefix(`/api/model-pricing`)"
      - "traefik.http.services.model-pricing.loadbalancer.server.port=8085"
    restart: unless-stopped

  scheduler:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.scheduler
    container_name: scheduler
    environment:
      <<: *common-variables
    expose:
      - "8086"
    depends_on:
      - rabbitmq
      - cockroachdb
    networks:
      - inferoute-net
    restart: unless-stopped

  payment-processing:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.payment-processing
    container_name: payment-processing
    environment:
      <<: *common-variables
    expose:
      - "8087"
    depends_on:
      - rabbitmq
      - cockroachdb
    networks:
      - inferoute-net
    restart: unless-stopped

  # CockroachDB container
  cockroachdb:
    image: cockroachdb/cockroach:v23.1.13
    container_name: cockroachdb
    command: start-single-node --insecure
    ports:
      - "26257:26257"
      - "8888:8080"
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    networks:
      - inferoute-net
    restart: unless-stopped

  # RabbitMQ container
  rabbitmq:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.rabbitmq
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - inferoute-net
    restart: unless-stopped

  # API Testing container
  api-testing:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    container_name: api-testing
    environment:
      <<: *common-variables
    depends_on:
      - rabbitmq
      - cockroachdb
    networks:
      - inferoute-net
    restart: unless-stopped

volumes:
  cockroach-data:
  rabbitmq-data:
  traefik-certificates:

networks:
  inferoute-net:
    name: inferoute-net
    external: true 
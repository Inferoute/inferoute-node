services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    profiles: ["development"]
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=inferoute-net"
      - "--entrypoints.web.address=:80"
      - "--log.level=DEBUG"
      - "--accesslog=true"
      - "--accesslog.fields.headers.names.User-Agent=keep"
      - "--accesslog.fields.headers.names.Authorization=keep"
      - "--accesslog.fields.headers.names.Content-Type=keep"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`localhost`, `traefik`) || HostRegexp(`{ip:192\\.168\\.[0-9]+\\.[0-9]+}`)"
      - "traefik.http.routers.api.entrypoints=web"
    networks:
      - inferoute-net
    restart: unless-stopped

  orchestrator:
    build:
      args:
        ENVIRONMENT: development
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator.rule=(Host(`localhost`, `traefik`) || HostRegexp(`{ip:192\\.168\\.[0-9]+\\.[0-9]+}`)) && PathPrefix(`/v1`)"
      - "traefik.http.routers.orchestrator.entrypoints=web"
      - "traefik.http.services.orchestrator.loadbalancer.server.port=8080"

  ai-applications:
    build:
      args:
        ENVIRONMENT: development
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-applications.rule=(Host(`localhost`, `traefik`) || HostRegexp(`{ip:192\\.168\\.[0-9]+\\.[0-9]+}`)) && PathPrefix(`/v1/models`)"
      - "traefik.http.routers.ai-applications.entrypoints=web"
      - "traefik.http.services.ai-applications.loadbalancer.server.port=8087"

  provider-management:
    build:
      args:
        ENVIRONMENT: development
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.provider-management.rule=(Host(`localhost`, `traefik`) || HostRegexp(`{ip:192\\.168\\.[0-9]+\\.[0-9]+}`)) && PathPrefix(`/api/provider`)"
      - "traefik.http.routers.provider-management.entrypoints=web"
      - "traefik.http.services.provider-management.loadbalancer.server.port=8082"

  provider-health:
    build:
      args:
        ENVIRONMENT: development
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.provider-health.rule=(Host(`localhost`, `traefik`) || HostRegexp(`{ip:192\\.168\\.[0-9]+\\.[0-9]+}`)) && PathPrefix(`/api/health/providers`)"
      - "traefik.http.routers.provider-health.entrypoints=web"
      - "traefik.http.services.provider-health.loadbalancer.server.port=8084"

  model-pricing:
    build:
      args:
        ENVIRONMENT: development
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.model-pricing.rule=(Host(`localhost`, `traefik`) || HostRegexp(`{ip:192\\.168\\.[0-9]+\\.[0-9]+}`)) && PathPrefix(`/api/model-pricing`)"
      - "traefik.http.routers.model-pricing.entrypoints=web"
      - "traefik.http.services.model-pricing.loadbalancer.server.port=8085"

  cloudflare-service:
    build:
      args:
        ENVIRONMENT: development 
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cloudflare-service.rule=(Host(`localhost`, `traefik`) || HostRegexp(`{ip:192\\.168\\.[0-9]+\\.[0-9]+}`)) && PathPrefix(`/api/cloudflare`)"
      - "traefik.http.routers.cloudflare-service.entrypoints=web"
      - "traefik.http.services.cloudflare-service.loadbalancer.server.port=8089" # Traefik routes to internal dev port

  tokenizer:
    build:
      args:
        ENVIRONMENT: development

  auth:
    build:
      args:
        ENVIRONMENT: development

  provider-communication:
    build:
      args:
        ENVIRONMENT: development

  scheduler:
    build:
      args:
        ENVIRONMENT: development

  payment-processing:
    build:
      args:
        ENVIRONMENT: development

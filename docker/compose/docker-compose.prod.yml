services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    profiles: ["production"]
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=inferoute-net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=DEBUG"
      - "--accesslog=true"
      - "--accesslog.fields.headers.names.User-Agent=keep"
      - "--accesslog.fields.headers.names.Authorization=keep"
      - "--accesslog.fields.headers.names.Content-Type=keep"
      - "--certificatesresolvers.letsencrypt.acme.email=charles@inferoute.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certificates/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/certificates
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.http-catchall.rule=Host(`core.inferoute.com`)"
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      - "traefik.http.routers.https-catchall.rule=Host(`core.inferoute.com`)"
      - "traefik.http.routers.https-catchall.entrypoints=websecure"
      - "traefik.http.routers.https-catchall.tls=true"
      - "traefik.http.routers.https-catchall.tls.certresolver=letsencrypt"
    networks:
      - inferoute-net
    restart: unless-stopped

  orchestrator:
    build:
      args:
        ENVIRONMENT: production
    labels:
      - "traefik.http.routers.orchestrator.entrypoints=websecure"
      - "traefik.http.routers.orchestrator.tls.certresolver=letsencrypt"

  provider-management:
    build:
      args:
        ENVIRONMENT: production
    labels:
      - "traefik.http.routers.provider-management.entrypoints=websecure"
      - "traefik.http.routers.provider-management.tls.certresolver=letsencrypt"

  provider-health:
    build:
      args:
        ENVIRONMENT: production
    labels:
      - "traefik.http.routers.provider-health.entrypoints=websecure"
      - "traefik.http.routers.provider-health.tls.certresolver=letsencrypt"

  model-pricing:
    build:
      args:
        ENVIRONMENT: production
    labels:
      - "traefik.http.routers.model-pricing.entrypoints=websecure"
      - "traefik.http.routers.model-pricing.tls.certresolver=letsencrypt"

  auth:
    build:
      args:
        ENVIRONMENT: production

  provider-communication:
    build:
      args:
        ENVIRONMENT: production

  scheduler:
    build:
      args:
        ENVIRONMENT: production

  payment-processing:
    build:
      args:
        ENVIRONMENT: production
